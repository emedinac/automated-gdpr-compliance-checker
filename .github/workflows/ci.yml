name: CI

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Lint
        run: poetry run ruff check src tests

      - name: Test with coverage
        run: poetry run pytest tests --cov=src/automatedcompliancechecker --cov-report=term-missing --cov-fail-under=80
